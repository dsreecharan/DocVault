# Application Name
spring.application.name=DocVault
# MongoDB
spring.data.mongodb.uri=mongodb://localhost:27017/docvault

# JWT ? use a long random base64 string as the signing secret
jwt.secret=dGhpcyBpcyBhIHNlY3JldCBrZXkgZm9yIGRvY3ZhdWx0
